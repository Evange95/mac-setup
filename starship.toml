# =============================================================================
# Starship Prompt Configuration
# Docs: https://starship.rs/config/
# =============================================================================

# Timeout for commands executed by starship (ms)
command_timeout = 1000

# Insert blank line between prompts
add_newline = true

# Prompt format
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$kubernetes\
$cmd_duration\
$line_break\
$character"""

# --- Prompt Character ---
[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

# --- Directory ---
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

# --- Git ---
[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"

# --- Languages (only show when relevant files detected) ---
[nodejs]
format = "[$symbol($version)]($style) "
symbol = "node "

[python]
format = "[$symbol($version)( \\($virtualenv\\))]($style) "
symbol = "py "

[rust]
format = "[$symbol($version)]($style) "
symbol = "rs "

[golang]
format = "[$symbol($version)]($style) "
symbol = "go "

# --- Infrastructure ---
[docker_context]
format = "[$symbol$context]($style) "
symbol = "docker "
only_with_files = true

[kubernetes]
disabled = false
format = "[$symbol$context( \\($namespace\\))]($style) "
symbol = "k8s "

# --- Command Duration ---
[cmd_duration]
min_time = 3000
format = "[$duration]($style) "
style = "bold yellow"

# --- Disabled modules (reduce noise) ---
[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true
