# =============================================================================
# Starship Prompt Configuration
# =============================================================================

# Fail fast — don't block the prompt waiting for slow git
command_timeout = 500

add_newline = false

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$kubernetes\
$cmd_duration\
$line_break\
$character"""

# --- Prompt Character ---
[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

# --- Directory ---
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

# --- Git ---
[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
ignore_submodules = true

# --- Languages (detect by marker files only, not file extensions) ---
[nodejs]
format = "[$symbol($version)]($style) "
symbol = "node "
detect_extensions = []
detect_files = ["package.json"]
detect_folders = ["node_modules"]

[python]
format = "[$symbol($version)( \\($virtualenv\\))]($style) "
symbol = "py "
detect_extensions = []
detect_files = ["pyproject.toml", "requirements.txt", "setup.py", "setup.cfg", "Pipfile", ".python-version"]
detect_folders = [".venv", "venv"]

[rust]
format = "[$symbol($version)]($style) "
symbol = "rs "
detect_extensions = []
detect_files = ["Cargo.toml"]

[golang]
format = "[$symbol($version)]($style) "
symbol = "go "
detect_extensions = []
detect_files = ["go.mod"]

# --- Infrastructure ---
[docker_context]
format = "[$symbol$context]($style) "
symbol = "docker "
only_with_files = true

[kubernetes]
disabled = false
format = "[$symbol$context( \\($namespace\\))]($style) "
symbol = "k8s "
detect_files = ["helmfile.yaml", "Chart.yaml"]
detect_folders = ["k8s", "kubernetes", "helm", "charts"]

# --- Command Duration ---
[cmd_duration]
min_time = 3000
format = "[$duration]($style) "
style = "bold yellow"

# --- Disabled modules ---
[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true
